name: Supabase DB

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase
        run: npm run supabase:start

      - name: Reset local database
        run: npm run supabase:db:reset

      - name: Run pgTAP tests
        run: npm run supabase:test:db

      - name: Lint database schema
        run: npm run supabase:lint:db

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --project-id genius-support-os
