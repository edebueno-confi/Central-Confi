name: Supabase DB

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-database:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck contracts
        run: npm run contracts:typecheck

      - name: Typecheck frontend
        run: npm run web:typecheck

      - name: Build frontend
        run: npm run web:build

      - name: Start Supabase
        run: npm run supabase:start

      - name: Wait for Supabase readiness
        run: npm run supabase:wait:ready

      - name: Reset local database
        run: npm run supabase:db:reset

      - name: Run pgTAP tests
        run: npm run supabase:test:db

      - name: Lint database schema
        run: npm run supabase:lint:db

      - name: Supabase diagnostics on failure
        if: failure()
        run: |
          npx supabase status || true
          docker ps -a || true
          for name in \
            supabase_db_genius-support-os \
            supabase_rest_genius-support-os \
            supabase_edge_runtime_genius-support-os \
            supabase_storage_genius-support-os \
            supabase_auth_genius-support-os
          do
            echo "::group::$name"
            docker logs "$name" || true
            echo "::endgroup::"
          done

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --project-id genius-support-os
